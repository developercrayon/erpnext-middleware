version: '3.9'

services:
  # ─── NestJS Application ──────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: erpnext-middleware
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: production
      APP_PORT: 3000
      # Database
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_NAME: ${DB_NAME:-erpnext_middleware}
      DB_SYNCHRONIZE: 'true'
      DB_LOGGING: 'false'
      # Redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      # JWT
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      # Security
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-change-me}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET:-change-me}
      # ERPNext
      ERPNEXT_BASE_URL: ${ERPNEXT_BASE_URL:-}
      ERPNEXT_API_KEY: ${ERPNEXT_API_KEY:-}
      ERPNEXT_API_SECRET: ${ERPNEXT_API_SECRET:-}
      ERPNEXT_COMPANY: ${ERPNEXT_COMPANY:-}
      ERPNEXT_DEFAULT_WAREHOUSE: ${ERPNEXT_DEFAULT_WAREHOUSE:-}
      # Amazon
      AMAZON_CLIENT_ID: ${AMAZON_CLIENT_ID:-}
      AMAZON_CLIENT_SECRET: ${AMAZON_CLIENT_SECRET:-}
      AMAZON_REFRESH_TOKEN: ${AMAZON_REFRESH_TOKEN:-}
      AMAZON_MARKETPLACE_ID: ${AMAZON_MARKETPLACE_ID:-A21TJRUUN4KGV}
      AMAZON_SELLER_ID: ${AMAZON_SELLER_ID:-}
      AMAZON_ENDPOINT: ${AMAZON_ENDPOINT:-https://sellingpartnerapi-eu.amazon.com}
      # Flipkart
      FLIPKART_APP_ID: ${FLIPKART_APP_ID:-}
      FLIPKART_APP_SECRET: ${FLIPKART_APP_SECRET:-}
      FLIPKART_ACCESS_TOKEN: ${FLIPKART_ACCESS_TOKEN:-}
      FLIPKART_API_URL: ${FLIPKART_API_URL:-https://api.flipkart.net/sellers}
      # Logging
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_DIR: /app/logs
    volumes:
      - app-logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - middleware-net
    healthcheck:
      test: ['CMD', 'node', '-e', "require('http').get('http://localhost:3000/api/v1/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ─── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: erpnext-middleware-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-erpnext_middleware}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - middleware-net
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_NAME:-erpnext_middleware}']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ─── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: erpnext-middleware-redis
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      ${REDIS_PASSWORD:+--requirepass $REDIS_PASSWORD}
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data
    networks:
      - middleware-net
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
  app-logs:
    driver: local

networks:
  middleware-net:
    driver: bridge
